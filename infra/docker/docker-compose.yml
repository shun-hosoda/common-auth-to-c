############################################################
# Supabase OSS セルフホスト — Docker Compose
# common-auth-to-c 開発環境
#
# 起動: docker compose up -d
# 停止: docker compose down
#
# 事前準備:
#   cp .env.example .env
#   各変数を設定（JWT_SECRET, キー類, Google OAuth等）
############################################################

name: common-auth-to-c

services:

  # ----------------------------------------------------------
  # PostgreSQL 16 — 認証データ + アプリデータ
  # ----------------------------------------------------------
  db:
    image: supabase/postgres:15.8.1.060
    healthcheck:
      test: pg_isready -U supabase_admin -h localhost
      interval: 5s
      timeout: 5s
      retries: 10
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - log_min_messages=fatal
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_HOST: /var/run/postgresql
      PGPORT: 5432
      POSTGRES_PORT: 5432
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: ${JWT_EXPIRY:-900}
    volumes:
      - ./volumes/db/data:/var/lib/postgresql/data:Z
      - ./volumes/db/init:/docker-entrypoint-initdb.d:Z

  # ----------------------------------------------------------
  # Kong — API Gateway（GoTrue / PostgREST へのルーティング）
  # ----------------------------------------------------------
  kong:
    image: kong:2.8.1
    restart: unless-stopped
    ports:
      - "8100:8000/tcp"  # HTTP  — ホスト公開ポート(8000競合回避)
      - "8443:8443/tcp"  # HTTPS（ローカル開発では不要）
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
    volumes:
      - ./volumes/api/kong.yml:/home/kong/kong.yml:ro

  # ----------------------------------------------------------
  # GoTrue — Supabase Auth（認証コア）
  # ----------------------------------------------------------
  auth:
    image: supabase/gotrue:v2.164.0
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      timeout: 5s
      interval: 5s
      retries: 3
    restart: unless-stopped
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL:-http://localhost:8100}

      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}

      GOTRUE_SITE_URL: ${SITE_URL:-http://localhost:3000}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS:-http://localhost:3000/auth/callback}

      GOTRUE_DISABLE_SIGNUP: false
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: ${JWT_EXPIRY:-900}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}

      # メール確認を必須化（FR-003）
      GOTRUE_MAILER_AUTOCONFIRM: false
      GOTRUE_MAILER_SECURE_EMAIL_CHANGE_ENABLED: true

      # メール列挙対策
      GOTRUE_SECURITY_REFRESH_TOKEN_ROTATION_ENABLED: true
      GOTRUE_SECURITY_REFRESH_TOKEN_REUSE_INTERVAL: 10

      # SMTP（開発: inbucket）
      GOTRUE_SMTP_HOST: ${SMTP_HOST:-inbucket}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-2500}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL:-admin@example.com}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME:-common-auth-to-c}

      # Google OAuth
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: ${GOTRUE_EXTERNAL_GOOGLE_ENABLED:-false}
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID:-}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${GOTRUE_EXTERNAL_GOOGLE_SECRET:-}
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: ${GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI:-http://localhost:8100/auth/v1/callback}

  # ----------------------------------------------------------
  # PostgREST — REST API（プロフィール取得等）
  # ----------------------------------------------------------
  rest:
    image: postgrest/postgrest:v12.2.0
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: ${JWT_EXPIRY:-900}

  # ----------------------------------------------------------
  # Inbucket — 開発用メール受信サーバー
  # Web UI: http://localhost:9000
  # ----------------------------------------------------------
  inbucket:
    image: inbucket/inbucket:stable
    restart: unless-stopped
    ports:
      - "9000:9000"  # Web UI
      - "2500:2500"  # SMTP
      - "1100:1100"  # POP3

  # ----------------------------------------------------------
  # Next.js — フロントエンドアプリ（開発サーバー）
  # ----------------------------------------------------------
  nextjs:
    build:
      context: ../../frontend
      dockerfile: ../infra/docker/Dockerfile.frontend
    depends_on:
      auth:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "3100:3000"
    environment:
      NEXT_PUBLIC_SUPABASE_URL: http://kong:8000
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
      NEXT_PUBLIC_APP_URL: ${SITE_URL:-http://localhost:3100}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
    volumes:
      - ../../frontend:/app
      - /app/node_modules
      - /app/.next

  # ----------------------------------------------------------
  # db-migrate — GoTrue 起動後に FK・trigger・RLS を適用
  # auth が healthy になってから一回だけ実行される
  # ----------------------------------------------------------
  db-migrate:
    image: postgres:15-alpine
    depends_on:
      auth:
        condition: service_healthy
    restart: "no"
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./volumes/db/migrations:/migrations:ro
    command: >
      psql
        -h db
        -U supabase_admin
        -d ${POSTGRES_DB:-postgres}
        -f /migrations/02_post_auth_setup.sql
